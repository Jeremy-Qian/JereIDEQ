name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6
    
    - name: Check Python syntax
      run: |
        python -m py_compile src/ui/codeEditor.py
        python -m py_compile src/ui/lineNumber.py
        python -m py_compile src/ui/mainWindow.py
        python -m py_compile src/ui/statusBar.py
        python -m py_compile src/JereIDE.py
        python -m py_compile src/const/theme.py
        echo "All Python files passed syntax check"
    
    - name: Verify imports
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        from ui.codeEditor import QCodeEditor, PythonSyntaxHighlighter
        from ui.lineNumber import LineNumberArea
        from ui.mainWindow import MainWindow
        from ui.statusBar import StatusBar
        from const.theme import *
        print('All imports successful')
        "